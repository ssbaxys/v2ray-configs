name: Sync VPN Configs

on:
  schedule:
      - cron: '*/4 * * * *'
        workflow_dispatch:

        jobs:
          update-config:
              runs-on: ubuntu-latest
                  permissions:
                        contents: write

                            steps:
                                  - name: Checkout repository
                                          uses: actions/checkout@v4

                                                - name: Download target file
                                                        run: |
                                                                  curl -sL https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt -o geo-configs.txt

                                                                        - name: Commit and push if changed
                                                                                run: |
                                                                                          git config --global user.name 'github-actions[bot]'
                                                                                                    git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                                                                                                              git add geo-configs.txt
                                                                                                                        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update geo-configs.txt" && git push)name